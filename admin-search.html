<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rise Stronger — Search</title>

    <style>
      :root {
        --rssc-color-bg-canvas: #f7f7f5;
        --rssc-color-bg-surface: #ffffff;
        --rssc-color-bg-soft: #fcfcfb;
        --rssc-color-bg-hover: #f1f1ee;
        --rssc-color-bg-selected: #eef2ff;
        --rssc-color-text-primary: #171717;
        --rssc-color-text-secondary: #4b4a45;
        --rssc-color-text-tertiary: #8c8a80;
        --rssc-color-border-subtle: #e8e8e3;
        --rssc-color-border-default: #ddddd6;
        --rssc-color-border-focus: #3d5afe;
        --rssc-focus-shadow: 0 0 0 1px #3d5afe,
          0 0 0 4px rgba(61, 90, 254, 0.14);
        --rssc-app-shell-bg: var(--rssc-color-bg-canvas);
        --rssc-sidebar-width: 220px;
        --rssc-sidebar-bg: var(--rssc-color-bg-soft);
        --rssc-header-bg: var(--rssc-color-bg-soft);
      }

      *,
      *::before,
      *::after { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }

      body {
        margin: 0;
        font-family: "General Sans", Inter, system-ui, sans-serif;
        font-size: 14px;
        line-height: 20px;
        color: var(--rssc-color-text-primary);
        background: var(--rssc-color-bg-canvas);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      img, svg { display: block; max-width: 100%; }
      button, input, select, textarea { font: inherit; }
      p, h1, h2, h3, h4, h5, h6 { margin: 0; }

      /* ─── App shell ──────────────────────────────────────────────────── */
      .rssc-app-shell {
        height: 100dvh;
        display: grid;
        grid-template-columns: auto 1fr;
        background: var(--rssc-app-shell-bg);
        overflow: hidden;
      }
      .rssc-app-shell__sidebar {
        width: var(--rssc-sidebar-width);
        border-right: 1px solid var(--rssc-color-border-subtle);
        background: var(--rssc-sidebar-bg);
        padding: 20px 12px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow-y: auto;
      }
      .rssc-app-shell__main {
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }
      .rssc-app-header {
        min-height: 64px;
        padding: 0 24px;
        border-bottom: 1px solid var(--rssc-color-border-subtle);
        background: var(--rssc-header-bg);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .rssc-app-header__leading,
      .rssc-app-header__trailing {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .rssc-app-sidebar {
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex: 1;
      }
      .rssc-app-sidebar__section {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        width: 100%;
      }
      .rssc-app-sidebar > .rssc-app-sidebar__section:last-child { margin-top: auto; }
      .rssc-app-sidebar__group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      /* ─── Page layout ────────────────────────────────────────────────── */
      .rssc-page-layout {
        width: 100%;
        padding: 24px 32px;
      }
      .rssc-page-layout__inner {
        width: 100%;
        max-width: 1360px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .rssc-page-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }
      .rssc-page-header__main { display: flex; flex-direction: column; gap: 4px; }
      .rssc-page-header__title {
        color: var(--rssc-color-text-primary);
        font-size: 24px;
        font-weight: 600;
        line-height: 32px;
      }
      .rssc-page-header__description {
        color: var(--rssc-color-text-secondary);
        font-size: 14px;
        line-height: 20px;
      }

      /* ─── NavItem ────────────────────────────────────────────────────── */
      .rssc-nav-item {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--rssc-color-text-secondary);
        min-height: 40px;
        width: 100%;
        border-radius: 10px;
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        text-decoration: none;
        cursor: pointer;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        transition:
          background-color 120ms cubic-bezier(0.2, 0, 0, 1),
          color 120ms cubic-bezier(0.2, 0, 0, 1);
      }
      .rssc-nav-item:hover { background: var(--rssc-color-bg-hover); }
      .rssc-nav-item[data-active="true"] {
        background: var(--rssc-color-bg-selected);
        color: var(--rssc-color-text-primary);
      }
      .rssc-nav-item:focus-visible { outline: none; box-shadow: var(--rssc-focus-shadow); }
      .rssc-nav-item__leading { display: inline-flex; align-items: center; gap: 8px; }
      .rssc-nav-item__label { white-space: nowrap; }

      /* ─── Input (header search) ──────────────────────────────────────── */
      .rssc-field-root { display: flex; flex-direction: column; gap: 6px; }
      .rssc-input-root--full-width { width: 100%; }
      .rssc-input-shell {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        min-height: 32px;
        padding: 0 12px;
        border-radius: 12px;
        border: 1px solid #e8e8e3;
        background: #ffffff;
        transition:
          border-color 120ms cubic-bezier(0.2, 0, 0, 1),
          box-shadow 120ms cubic-bezier(0.2, 0, 0, 1);
      }
      .rssc-input-shell:hover { border-color: #ddddd6; }
      .rssc-input-shell:focus-within {
        border-color: var(--rssc-color-border-focus);
        box-shadow: var(--rssc-focus-shadow);
      }
      .rssc-input-element {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--rssc-color-text-primary);
        font-family: inherit;
        font-size: 12px;
        font-weight: 400;
        line-height: 16px;
        padding: 0;
        margin: 0;
      }
      .rssc-input-element::placeholder { color: var(--rssc-color-text-tertiary); }
      .rssc-input-affix {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--rssc-color-text-tertiary);
      }

      /* ─── Admin shell specifics ──────────────────────────────────────── */
      .rssc-admin-wordmark {
        display: inline-flex; align-items: center; gap: 10px;
        color: #171717; padding: 4px 12px; user-select: none;
      }
      .rssc-admin-wordmark__icon {
        width: 28px; height: 28px; border-radius: 8px;
        background: #eef2ff; color: #3347e6;
        display: inline-flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .rssc-admin-wordmark__text {
        font-size: 15px; font-weight: 700; line-height: 20px; letter-spacing: -0.015em;
      }
      .rssc-admin-page-title {
        font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
        color: #171717; white-space: nowrap;
      }
      .rssc-admin-sidebar-footer { display: flex; flex-direction: column; gap: 6px; }
      .rssc-search-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid #e8e8e3;border-radius:12px;box-shadow:0 4px 6px -2px rgba(23,23,23,.06),0 12px 24px -4px rgba(23,23,23,.12);overflow:hidden;min-width:320px;z-index:60;}
      .rssc-search-dd-section{display:flex;flex-direction:column;border-bottom:1px solid #f1f1ee;}
      .rssc-search-dd-section:last-child{border-bottom:none;}
      .rssc-search-dd-section-head{display:flex;align-items:center;gap:6px;padding:8px 14px 6px;}
      .rssc-search-dd-section-label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#8c8a80;flex:1;}
      .rssc-search-dd-clear{appearance:none;border:none;background:transparent;font-size:11px;font-weight:500;color:#3d5afe;cursor:pointer;padding:0;font-family:inherit;}
      .rssc-search-dd-clear:hover{color:#2f4af6;}
      .rssc-search-dd-row{appearance:none;border:none;background:transparent;width:100%;display:flex;align-items:center;gap:10px;padding:9px 14px;text-align:left;cursor:pointer;font-family:inherit;transition:background 80ms;text-decoration:none;color:inherit;}
      .rssc-search-dd-row:hover{background:#f8f8f6;}
      .rssc-search-dd-row-title{font-size:13px;font-weight:500;color:#171717;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
      .rssc-search-dd-row-meta{font-size:12px;color:#8c8a80;white-space:nowrap;flex-shrink:0;}
      .rssc-search-dd-footer{border-top:1px solid #f1f1ee;padding:6px 8px;}
      .rssc-search-dd-see-all{appearance:none;border:none;background:transparent;width:100%;display:flex;align-items:center;gap:8px;padding:8px;text-align:left;cursor:pointer;font-family:inherit;font-size:13px;color:#4b4a45;border-radius:8px;transition:background 80ms;}
      .rssc-search-dd-see-all:hover{background:#f1f1ee;color:#171717;}
      .rssc-search-dd-see-all strong{color:#171717;font-weight:600;}
      .rssc-search-dd-empty{padding:20px 16px;font-size:13px;color:#8c8a80;text-align:center;}
      .rssc-search-dd-empty strong{color:#4b4a45;font-weight:500;}
      .rssc-search-highlight{background:#fef3c7;color:inherit;border-radius:2px;padding:0 1px;}
      .rssc-admin-search { position: relative; width: 280px; flex-shrink: 0; }
      .rssc-admin-notifications { position: relative; flex-shrink: 0; }

      .rssc-admin-icon-btn {
        appearance: none; background: transparent; border: none;
        width: 36px; height: 36px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; color: #4b4a45; flex-shrink: 0;
        transition: background 120ms cubic-bezier(0.2, 0, 0, 1),
          color 120ms cubic-bezier(0.2, 0, 0, 1);
        position: relative;
      }
      .rssc-admin-icon-btn:hover { background: #f1f1ee; color: #171717; }
      .rssc-admin-icon-btn:focus-visible { outline: none; box-shadow: var(--rssc-focus-shadow); }
      .rssc-admin-icon-btn-badge {
        position: absolute; top: 8px; right: 8px;
        width: 7px; height: 7px; border-radius: 999px;
        background: #d14343; box-shadow: 0 0 0 2px #fcfcfb;
      }

      .rssc-notifications-dropdown {
        position: absolute; top: calc(100% + 8px); right: 0;
        width: 360px; max-width: min(360px, calc(100vw - 24px));
        background: #ffffff; border: 1px solid #e8e8e3;
        border-radius: 14px;
        box-shadow: 0 4px 6px -2px rgba(23, 23, 23, 0.06),
          0 12px 24px -4px rgba(23, 23, 23, 0.12);
        overflow: hidden; z-index: 60;
      }
      .rssc-notifications-header {
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px; padding: 14px 16px 12px; border-bottom: 1px solid #f1f1ee;
      }
      .rssc-notifications-heading { display: flex; flex-direction: column; gap: 2px; }
      .rssc-notifications-title { font-size: 14px; font-weight: 600; color: #171717; line-height: 20px; }
      .rssc-notifications-count { font-size: 12px; color: #8c8a80; line-height: 16px; }
      .rssc-notifications-mark-read {
        appearance: none; border: none; background: transparent; padding: 0;
        font-family: inherit; font-size: 12px; font-weight: 500;
        color: #3d5afe; cursor: pointer; flex-shrink: 0;
      }
      .rssc-notifications-mark-read:hover { color: #2f4af6; }
      .rssc-notifications-mark-read:disabled { color: #b8b6ad; cursor: default; }
      .rssc-notifications-list { display: flex; flex-direction: column; }
      .rssc-notifications-item {
        appearance: none; border: none; background: transparent; width: 100%;
        display: flex; align-items: flex-start; gap: 12px;
        padding: 14px 16px; text-align: left; cursor: pointer;
        font-family: inherit;
        transition: background 80ms cubic-bezier(0.2, 0, 0, 1);
        border-bottom: 1px solid #f1f1ee;
        text-decoration: none; color: inherit;
      }
      .rssc-notifications-item:last-child { border-bottom: none; }
      .rssc-notifications-item:hover { background: #f8f8f6; }
      .rssc-notifications-item[data-read] { background: #fcfcfb; }
      .rssc-notifications-item-icon {
        width: 28px; height: 28px; border-radius: 999px;
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      }
      .rssc-notifications-item-icon--warning { background: #fff7e8; color: #c88719; }
      .rssc-notifications-item-icon--danger { background: #fdecec; color: #d14343; }
      .rssc-notifications-item-icon--info { background: #eef6ff; color: #2e7ccf; }
      .rssc-notifications-item-icon--neutral { background: #f1f1ee; color: #6b6a63; }
      .rssc-notifications-item-copy { display: flex; flex-direction: column; gap: 4px; min-width: 0; flex: 1; }
      .rssc-notifications-item-topline { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
      .rssc-notifications-item-title { font-size: 13px; font-weight: 500; line-height: 18px; color: #171717; }
      .rssc-notifications-item-time { font-size: 11px; color: #8c8a80; line-height: 16px; white-space: nowrap; flex-shrink: 0; }
      .rssc-notifications-item-meta { font-size: 12px; color: #6b6a63; line-height: 18px; }
      .rssc-notifications-item-unread {
        width: 8px; height: 8px; border-radius: 999px;
        background: #3d5afe; flex-shrink: 0; margin-top: 5px;
      }

      .rssc-admin-avatar {
        appearance: none; width: 32px; height: 32px; border-radius: 999px;
        background: #e8e8e3; border: none; cursor: pointer;
        font-family: inherit; font-size: 10px; font-weight: 600;
        letter-spacing: 0.05em; color: #4b4a45;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        transition: background 120ms cubic-bezier(0.2, 0, 0, 1);
      }
      .rssc-admin-avatar:hover { background: #ddddd6; }
      .rssc-admin-avatar:focus-visible { outline: none; box-shadow: var(--rssc-focus-shadow); }

      .rssc-admin-account-wrap { position: relative; flex-shrink: 0; }
      .rssc-admin-account-menu {
        position: absolute; top: calc(100% + 8px); right: 0;
        width: 200px; background: #ffffff; border: 1px solid #e8e8e3;
        border-radius: 12px;
        box-shadow: 0 2px 6px rgba(23, 23, 23, 0.06),
          0 10px 28px rgba(23, 23, 23, 0.1);
        z-index: 60; overflow: hidden;
      }
      .rssc-admin-account-menu-user { padding: 12px 14px 10px; display: flex; flex-direction: column; gap: 1px; }
      .rssc-admin-account-menu-name { font-size: 13px; font-weight: 600; color: #171717; line-height: 18px; }
      .rssc-admin-account-menu-role { font-size: 11px; color: #8c8a80; line-height: 16px; }
      .rssc-admin-account-menu-divider { height: 1px; background: #f1f1ee; }
      .rssc-admin-account-menu-item {
        display: flex; align-items: center; padding: 10px 14px;
        font-size: 13px; font-weight: 500; color: #171717;
        text-decoration: none; cursor: pointer;
        transition: background 100ms cubic-bezier(0.2, 0, 0, 1);
      }
      .rssc-admin-account-menu-item:hover { background: #f7f7f5; }
      .rssc-admin-account-menu-item--danger { color: #d14343; }
      .rssc-admin-account-menu-item--danger:hover { background: #fef2f2; }

      .rssc-admin-menu-btn {
        display: none; appearance: none; background: transparent; border: none;
        width: 36px; height: 36px; border-radius: 10px;
        align-items: center; justify-content: center; cursor: pointer;
        color: #4b4a45; flex-shrink: 0;
        transition: background 120ms cubic-bezier(0.2, 0, 0, 1);
      }
      .rssc-admin-menu-btn:hover { background: #f1f1ee; }

      .rssc-admin-overlay {
        position: fixed; inset: 0; background: rgba(23, 23, 23, 0.4);
        z-index: 40; display: none;
      }
      .rssc-admin-overlay[data-open="true"] { display: block; }

      .rssc-admin-drawer {
        position: fixed; top: 0; left: 0; bottom: 0; width: 220px;
        background: #fcfcfb; border-right: 1px solid #e8e8e3;
        z-index: 50; display: flex; flex-direction: column;
        padding: 16px 12px; gap: 16px;
        transform: translateX(-100%);
        transition: transform 240ms cubic-bezier(0.2, 0, 0, 1);
      }
      .rssc-admin-drawer[data-open="true"] { transform: translateX(0); }
      .rssc-admin-drawer-close {
        appearance: none; background: transparent; border: none;
        width: 36px; height: 36px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; color: #4b4a45; align-self: flex-end; flex-shrink: 0;
        transition: background 120ms cubic-bezier(0.2, 0, 0, 1);
      }
      .rssc-admin-drawer-close:hover { background: #f1f1ee; }

      /* ─── Search results page (from pages/admin/search/search.css) ───── */
      .rssc-search-page {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .rssc-search-page-section {
        display: flex;
        flex-direction: column;
        gap: 0;
        border: 1px solid #e8e8e3;
        border-radius: 12px;
        overflow: hidden;
        background: #ffffff;
      }

      .rssc-search-page-section-head {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 11px 16px;
        border-bottom: 1px solid #f1f1ee;
        background: #fcfcfb;
      }

      .rssc-search-page-section-icon {
        display: flex;
        align-items: center;
        color: #8c8a80;
      }

      .rssc-search-page-section-label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #4b4a45;
        text-transform: uppercase;
        flex: 1;
      }

      .rssc-search-page-section-count {
        font-size: 11px;
        font-weight: 500;
        color: #8c8a80;
        background: #f1f1ee;
        border-radius: 999px;
        padding: 1px 7px;
        font-variant-numeric: tabular-nums;
      }

      .rssc-search-page-list {
        display: flex;
        flex-direction: column;
      }

      .rssc-search-page-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 16px;
        border-bottom: 1px solid #f1f1ee;
        text-decoration: none;
        transition: background 100ms cubic-bezier(0.2, 0, 0, 1);
        cursor: pointer;
      }

      .rssc-search-page-row:last-child { border-bottom: none; }
      .rssc-search-page-row:hover { background: #f8f8f6; }

      .rssc-search-page-row-title {
        font-size: 14px;
        font-weight: 500;
        color: #171717;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .rssc-search-page-row-meta {
        font-size: 12px;
        color: #8c8a80;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .rssc-search-page-highlight {
        background: #fef3c7;
        color: inherit;
        border-radius: 2px;
        padding: 0 1px;
      }

      /* Empty state */
      .rssc-empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 8px;
        padding: 32px;
        background: #fff;
        border: 1px solid #e8e8e3;
        border-radius: 16px;
      }

      .rssc-empty-state__title {
        color: #171717;
        font-size: 16px;
        font-weight: 600;
        line-height: 24px;
      }

      .rssc-empty-state__description {
        color: #4b4a45;
        font-size: 14px;
        line-height: 20px;
        max-width: 480px;
      }

      /* ─── Responsive ─────────────────────────────────────────────────── */
      @media (max-width: 1279px) {
        .rssc-admin-search { width: 220px; }
      }
      @media (max-width: 767px) {
        .rssc-app-shell { grid-template-columns: 1fr; }
        .rssc-app-shell__sidebar { display: none; }
        .rssc-app-header { padding: 0 16px; }
        .rssc-page-layout { padding: 20px 16px; }
        .rssc-admin-menu-btn { display: flex; }
        .rssc-admin-search { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="rssc-admin-overlay" id="admin-overlay" aria-hidden="true" data-comment="admin-overlay"></div>

    <div
      class="rssc-admin-drawer"
      id="admin-drawer"
      role="dialog"
      aria-modal="true"
      aria-label="Navigation menu"
      data-comment="admin-drawer"
    >
      <button class="rssc-admin-drawer-close" id="admin-drawer-close" aria-label="Close navigation menu" type="button" data-comment="admin-drawer-close">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
      <nav class="rssc-app-sidebar" aria-label="Drawer navigation" data-comment="admin-drawer-nav">
        <div class="rssc-app-sidebar__section" data-comment="admin-drawer-wordmark-wrap">

          const sdStore={history:[],listeners:new Set()};
          function pushHistory(q){sdStore.history=[q].concat(sdStore.history.filter((x)=>x!==q)).slice(0,5);if(dropdown.style.display==="block")render();}
          function highlightNodes(text,q){const qq=q.toLowerCase();const lower=text.toLowerCase();const idx=lower.indexOf(qq);if(idx===-1)return[document.createTextNode(text)];return[document.createTextNode(text.slice(0,idx)),el2("mark",{className:"rssc-search-highlight",textContent:text.slice(idx,idx+q.length)}),document.createTextNode(text.slice(idx+q.length))];}
          function sectionHead(label,onClear){const head=el2("div",{className:"rssc-search-dd-section-head","data-comment":"admin-search-dd-"+label.toLowerCase()+"-head"},[el2("span",{className:"rssc-search-dd-section-label",textContent:label})]);if(onClear){const btn=el2("button",{type:"button",className:"rssc-search-dd-clear","data-comment":"admin-search-dd-clear",textContent:"Clear"});btn.addEventListener("click",(e)=>{e.stopPropagation();onClear();});head.appendChild(btn);}return head;}
          function historyRow(q){const row=el2("button",{type:"button",className:"rssc-search-dd-row",role:"option","data-comment":"admin-search-dd-history-"+encodeURIComponent(q)},[el2("span",{className:"rssc-search-dd-row-title",textContent:q})]);row.addEventListener("click",()=>{input.value=q;render();});return row;}
          function resultRow(item,query){const titleSpan=el2("span",{className:"rssc-search-dd-row-title"},highlightNodes(item.title,query));const children=[titleSpan];if(item.meta)children.push(el2("span",{className:"rssc-search-dd-row-meta",textContent:item.meta}));const a=el2("a",{className:"rssc-search-dd-row",href:item.href,role:"option","data-comment":"admin-search-dd-result-"+item.id},children);a.addEventListener("click",()=>pushHistory(query));return a;}
          function renderSection(label,items,query){const section=el2("div",{className:"rssc-search-dd-section","data-comment":"admin-search-dd-section-"+label.toLowerCase()},[sectionHead(label)]);items.slice(0,4).forEach((it)=>section.appendChild(resultRow(it,query)));return section;}
          function render(){const q=input.value;const trimmed=q.trim();const results=doSearch(trimmed);const members=results.filter((r)=>r.type==="member");const classes=results.filter((r)=>r.type==="class");const payments=results.filter((r)=>r.type==="payment");const showHistory=!trimmed&&sdStore.history.length>0;dropdown.replaceChildren();if(!trimmed&&!showHistory){dropdown.style.display="none";return;}if(showHistory){const head=sectionHead("Recent",()=>{sdStore.history=[];render();});const section=el2("div",{className:"rssc-search-dd-section","data-comment":"admin-search-dd-section-recent"},[head]);sdStore.history.forEach((h)=>section.appendChild(historyRow(h)));dropdown.appendChild(section);}if(results.length>0){if(members.length)dropdown.appendChild(renderSection("Members",members,trimmed));if(classes.length)dropdown.appendChild(renderSection("Classes",classes,trimmed));if(payments.length)dropdown.appendChild(renderSection("Payments",payments,trimmed));const footer=el2("div",{className:"rssc-search-dd-footer","data-comment":"admin-search-dd-footer"});const seeAll=el2("button",{type:"button",className:"rssc-search-dd-see-all","data-comment":"admin-search-dd-see-all"});seeAll.appendChild(document.createTextNode('See all results for "'));seeAll.appendChild(el2("strong",{textContent:trimmed}));seeAll.appendChild(document.createTextNode('"'));seeAll.addEventListener("click",()=>{pushHistory(trimmed);navHref("admin-search.html?q="+encodeURIComponent(trimmed));});footer.appendChild(seeAll);dropdown.appendChild(footer);}else if(trimmed){const empty=el2("div",{className:"rssc-search-dd-empty","data-comment":"admin-search-dd-empty"});empty.appendChild(document.createTextNode('No results for "'));empty.appendChild(el2("strong",{textContent:trimmed}));empty.appendChild(document.createTextNode('"'));dropdown.appendChild(empty);}dropdown.style.display="block";}
          input.addEventListener("focus",render);
          input.addEventListener("input",render);
          input.addEventListener("keydown",(e)=>{if(e.key==="Escape"){dropdown.style.display="none";input.blur();}else if(e.key==="Enter"){const q=input.value.trim();if(!q)return;pushHistory(q);navHref("admin-search.html?q="+encodeURIComponent(q));}});
          document.addEventListener("mousedown",(e)=>{if(!wrap.contains(e.target))dropdown.style.display="none";});
        })();

      })();
    </script>
  </body>
</html>
