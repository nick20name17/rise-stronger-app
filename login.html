<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rise Stronger — Sign in</title>

    <style>
      /* ─── Design tokens (mirrors src/design-system/tokens) ───────────── */
      :root {
        /* Backgrounds */
        --rssc-color-bg-canvas: #f7f7f5;
        --rssc-color-bg-surface: #ffffff;
        --rssc-color-bg-soft: #fcfcfb;
        --rssc-color-bg-hover: #f1f1ee;
        --rssc-color-bg-pressed: #e8e8e3;
        --rssc-color-bg-selected: #eef2ff;

        /* Text */
        --rssc-color-text-primary: #171717;
        --rssc-color-text-secondary: #4b4a45;
        --rssc-color-text-tertiary: #8c8a80;
        --rssc-color-text-danger: #d14343;

        /* Borders */
        --rssc-color-border-subtle: #e8e8e3;
        --rssc-color-border-default: #ddddd6;
        --rssc-color-border-strong: #c9c8c0;
        --rssc-color-border-focus: #3d5afe;
        --rssc-color-border-danger: #d14343;

        /* Action (primary) */
        --rssc-color-action-primary-bg: #3d5afe;
        --rssc-color-action-primary-bg-hover: #2f4af6;
        --rssc-color-action-primary-bg-active: #263fdb;
        --rssc-color-action-primary-text: #ffffff;

        /* Motion */
        --rssc-motion-duration: 120ms;
        --rssc-motion-easing: cubic-bezier(0.2, 0, 0, 1);

        /* Focus */
        --rssc-focus-shadow: 0 0 0 1px #3d5afe,
          0 0 0 4px rgba(61, 90, 254, 0.14);

        /* Disabled */
        --rssc-disabled-opacity: 0.4;

        /* Field (md) */
        --rssc-field-height: 40px;
        --rssc-field-padding-x: 12px;
        --rssc-field-radius: 12px;
        --rssc-field-font-size: 14px;
        --rssc-field-line-height: 20px;
        --rssc-field-bg: var(--rssc-color-bg-surface);
        --rssc-field-bg-disabled: var(--rssc-color-bg-hover);
        --rssc-field-border: var(--rssc-color-border-subtle);
        --rssc-field-border-hover: var(--rssc-color-border-default);
        --rssc-field-border-focus: var(--rssc-color-border-focus);
        --rssc-field-border-error: var(--rssc-color-border-danger);
        --rssc-field-border-disabled: var(--rssc-color-border-strong);
        --rssc-field-text-color: var(--rssc-color-text-primary);
        --rssc-field-text-disabled: var(--rssc-color-text-tertiary);
        --rssc-field-placeholder-color: var(--rssc-color-text-tertiary);
        --rssc-field-label-color: var(--rssc-color-text-secondary);

        /* Button (primary md) */
        --rssc-button-height: 40px;
        --rssc-button-padding-x: 18px;
        --rssc-button-radius: 999px;
        --rssc-button-gap: 8px;
        --rssc-button-font-size: 14px;
        --rssc-button-font-weight: 500;
        --rssc-button-bg: var(--rssc-color-action-primary-bg);
        --rssc-button-bg-hover: var(--rssc-color-action-primary-bg-hover);
        --rssc-button-bg-active: var(--rssc-color-action-primary-bg-active);
        --rssc-button-border: transparent;
        --rssc-button-text: var(--rssc-color-action-primary-text);
        --rssc-spinner-size: 16px;
      }

      /* ─── Reset ──────────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        font-family: "General Sans", Inter, system-ui, sans-serif;
        font-size: 14px;
        line-height: 20px;
        color: var(--rssc-color-text-primary);
        background: var(--rssc-color-bg-canvas);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      img,
      svg {
        display: block;
        max-width: 100%;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      p,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        margin: 0;
      }

      /* ─── Field / Input (from design-system/components/styles.css) ──── */
      .rssc-field-root {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .rssc-input-root--full-width {
        width: 100%;
      }

      .rssc-field-label {
        color: var(--rssc-field-label-color);
        font-family: inherit;
        font-size: 12px;
        font-weight: 500;
        line-height: 16px;
        letter-spacing: 0.01em;
      }

      .rssc-input-shell {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        min-height: var(--rssc-field-height);
        padding: 0 var(--rssc-field-padding-x);
        border-radius: var(--rssc-field-radius);
        border: 1px solid var(--rssc-field-border);
        background: var(--rssc-field-bg);
        box-shadow: none;
        transition:
          background-color var(--rssc-motion-duration) var(--rssc-motion-easing),
          border-color var(--rssc-motion-duration) var(--rssc-motion-easing),
          color var(--rssc-motion-duration) var(--rssc-motion-easing),
          box-shadow var(--rssc-motion-duration) var(--rssc-motion-easing);
      }

      .rssc-input-shell:hover {
        border-color: var(--rssc-field-border-hover);
      }

      .rssc-input-shell:focus-within {
        border-color: var(--rssc-field-border-focus);
        box-shadow: var(--rssc-focus-shadow);
      }

      .rssc-field-root[data-disabled="true"] .rssc-input-shell {
        background: var(--rssc-field-bg-disabled);
        border-color: var(--rssc-field-border-disabled);
      }

      .rssc-input-element {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--rssc-field-text-color);
        font-family: inherit;
        font-size: var(--rssc-field-font-size);
        font-weight: 400;
        line-height: var(--rssc-field-line-height);
        padding: 0;
        margin: 0;
      }

      .rssc-input-element::placeholder {
        color: var(--rssc-field-placeholder-color);
      }

      .rssc-input-element:disabled {
        cursor: not-allowed;
        color: var(--rssc-field-text-disabled);
      }

      .rssc-input-element:focus-visible {
        outline: none;
      }

      .rssc-input-affix {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      /* ─── Button (from design-system/components/styles.css) ─────────── */
      .rssc-button {
        appearance: none;
        border: 1px solid var(--rssc-button-border);
        background: var(--rssc-button-bg);
        color: var(--rssc-button-text);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--rssc-button-gap);
        font-family: inherit;
        font-size: var(--rssc-button-font-size);
        font-weight: var(--rssc-button-font-weight);
        line-height: 1;
        user-select: none;
        text-decoration: none;
        position: relative;
        min-height: var(--rssc-button-height);
        padding: 0 var(--rssc-button-padding-x);
        border-radius: var(--rssc-button-radius);
        transition:
          background-color var(--rssc-motion-duration) var(--rssc-motion-easing),
          border-color var(--rssc-motion-duration) var(--rssc-motion-easing),
          color var(--rssc-motion-duration) var(--rssc-motion-easing),
          box-shadow var(--rssc-motion-duration) var(--rssc-motion-easing);
      }

      .rssc-button:hover:not(:disabled) {
        background: var(--rssc-button-bg-hover);
      }

      .rssc-button:active:not(:disabled) {
        background: var(--rssc-button-bg-active);
      }

      .rssc-button:focus-visible {
        outline: none;
        box-shadow: var(--rssc-focus-shadow);
      }

      .rssc-button:disabled {
        cursor: not-allowed;
        opacity: var(--rssc-disabled-opacity);
      }

      .rssc-button--full-width {
        width: 100%;
      }

      .rssc-button__icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .rssc-button__label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .rssc-spinner {
        width: var(--rssc-spinner-size);
        height: var(--rssc-spinner-size);
        animation: rssc-spin 0.7s linear infinite;
      }

      @keyframes rssc-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* ─── Login page (from pages/login/login.css) ───────────────────── */
      .rssc-login-root {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--rssc-color-bg-canvas);
        padding: 24px 16px;
      }

      .rssc-login-card {
        width: 100%;
        max-width: 400px;
        background: #ffffff;
        border: 1px solid #e8e8e3;
        border-radius: 16px;
        box-shadow:
          0 1px 2px rgba(23, 23, 23, 0.04),
          0 6px 18px rgba(23, 23, 23, 0.04);
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 32px;
      }

      .rssc-login-wordmark {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #8c8a80;
        user-select: none;
      }

      .rssc-login-header {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .rssc-login-title {
        font-size: 24px;
        font-weight: 600;
        line-height: 32px;
        letter-spacing: -0.02em;
        color: #171717;
      }

      .rssc-login-subtitle {
        font-size: 14px;
        font-weight: 400;
        line-height: 20px;
        color: #4b4a45;
        margin: 0;
      }

      .rssc-login-form {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .rssc-login-error {
        background: #fff0f0;
        color: #d14343;
        border: 1px solid rgba(209, 67, 67, 0.18);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
        line-height: 18px;
        font-weight: 400;
      }

      .rssc-login-forgot {
        display: flex;
        justify-content: flex-end;
        margin-top: -4px;
      }

      .rssc-login-link {
        appearance: none;
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        line-height: 18px;
        color: #3d5afe;
        text-decoration: none;
        border-radius: 2px;
        transition: color 120ms cubic-bezier(0.2, 0, 0, 1);
      }

      .rssc-login-link:hover {
        color: #2f4af6;
        text-decoration: underline;
      }

      .rssc-login-link:focus-visible {
        outline: 2px solid #3d5afe;
        outline-offset: 2px;
      }

      .rssc-login-pw-toggle {
        appearance: none;
        background: transparent;
        border: 0;
        padding: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #8c8a80;
        border-radius: 4px;
        transition: color 120ms cubic-bezier(0.2, 0, 0, 1);
        flex-shrink: 0;
      }

      .rssc-login-pw-toggle:hover {
        color: #4b4a45;
      }

      .rssc-login-pw-toggle:focus-visible {
        outline: none;
        box-shadow:
          0 0 0 1px #3d5afe,
          0 0 0 4px rgba(61, 90, 254, 0.14);
        border-radius: 4px;
      }

      /* ─── Mobile ─────────────────────────────────────────────────────── */
      @media (max-width: 479px) {
        .rssc-login-card {
          padding: 32px 24px;
          border-radius: 12px;
          gap: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main class="rssc-login-root" data-comment="login-root">
      <div
        class="rssc-login-card"
        role="region"
        aria-label="Sign in"
        data-comment="login-card"
      >
        <div
          class="rssc-login-wordmark"
          aria-hidden="true"
          data-comment="login-wordmark"
        >
          Rise Stronger
        </div>

        <div class="rssc-login-header" data-comment="login-header">
          <h1 class="rssc-login-title" data-comment="login-title">Sign in</h1>
          <p class="rssc-login-subtitle" data-comment="login-subtitle">
            Access your training workspace
          </p>
        </div>

        <form
          class="rssc-login-form"
          id="login-form"
          novalidate
          data-comment="login-form"
        >
          <div
            class="rssc-login-error"
            role="alert"
            aria-live="assertive"
            id="login-error"
            style="display: none"
            data-comment="login-error"
          ></div>

          <div
            class="rssc-field-root rssc-input-root rssc-input-root--full-width"
            data-comment="login-email-field"
          >
            <label
              class="rssc-field-label"
              for="login-email"
              data-comment="login-email-label"
              >Email</label
            >
            <div class="rssc-input-shell">
              <input
                id="login-email"
                class="rssc-input-element"
                type="email"
                placeholder="you@example.com"
                autocomplete="email"
                required
                data-comment="login-email-input"
              />
            </div>
          </div>

          <div
            class="rssc-field-root rssc-input-root rssc-input-root--full-width"
            data-comment="login-password-field"
          >
            <label
              class="rssc-field-label"
              for="login-password"
              data-comment="login-password-label"
              >Password</label
            >
            <div class="rssc-input-shell">
              <input
                id="login-password"
                class="rssc-input-element"
                type="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
                data-comment="login-password-input"
              />
              <span class="rssc-input-affix">
                <button
                  type="button"
                  class="rssc-login-pw-toggle"
                  id="login-pw-toggle"
                  aria-label="Show password"
                  data-comment="login-password-toggle"
                >
                  <svg
                    id="login-pw-icon-eye"
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.75"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path
                      d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"
                    />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                  <svg
                    id="login-pw-icon-eye-off"
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.75"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                    style="display: none"
                  >
                    <path
                      d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"
                    />
                    <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242" />
                    <path
                      d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"
                    />
                    <path d="m2 2 20 20" />
                  </svg>
                </button>
              </span>
            </div>
          </div>

          <div class="rssc-login-forgot" data-comment="login-forgot">
            <button
              type="button"
              class="rssc-login-link"
              data-comment="login-forgot-btn"
            >
              Forgot password?
            </button>
          </div>

          <button
            type="submit"
            class="rssc-button rssc-button--full-width"
            id="login-submit"
            data-comment="login-submit"
          >
            <span
              class="rssc-button__icon"
              id="login-submit-spinner"
              style="display: none"
              aria-hidden="true"
            >
              <svg
                class="rssc-spinner"
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
              >
                <circle
                  cx="12"
                  cy="12"
                  r="8"
                  stroke="currentColor"
                  stroke-width="1.75"
                  opacity="0.2"
                />
                <path
                  d="M20 12a8 8 0 0 0-8-8"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="rssc-button__label">Sign in</span>
          </button>
        </form>
      </div>
    </main>

    <script>
      (function () {
        const form = document.getElementById("login-form");
        const emailInput = document.getElementById("login-email");
        const passwordInput = document.getElementById("login-password");
        const errorBox = document.getElementById("login-error");
        const submitBtn = document.getElementById("login-submit");
        const spinnerWrap = document.getElementById("login-submit-spinner");
        const pwToggle = document.getElementById("login-pw-toggle");
        const eyeIcon = document.getElementById("login-pw-icon-eye");
        const eyeOffIcon = document.getElementById("login-pw-icon-eye-off");
        const emailField = emailInput.closest(".rssc-field-root");
        const passwordField = passwordInput.closest(".rssc-field-root");

        let showPassword = false;

        function setLoading(next) {
          submitBtn.disabled = next;
          if (next) {
            submitBtn.setAttribute("data-loading", "true");
            spinnerWrap.style.display = "inline-flex";
          } else {
            submitBtn.removeAttribute("data-loading");
            spinnerWrap.style.display = "none";
          }
          emailInput.disabled = next;
          passwordInput.disabled = next;
          emailField.setAttribute("data-disabled", next ? "true" : "false");
          passwordField.setAttribute("data-disabled", next ? "true" : "false");
        }

        function setError(message) {
          if (message) {
            errorBox.textContent = message;
            errorBox.style.display = "block";
          } else {
            errorBox.textContent = "";
            errorBox.style.display = "none";
          }
        }

        pwToggle.addEventListener("click", function () {
          showPassword = !showPassword;
          passwordInput.type = showPassword ? "text" : "password";
          pwToggle.setAttribute(
            "aria-label",
            showPassword ? "Hide password" : "Show password",
          );
          eyeIcon.style.display = showPassword ? "none" : "block";
          eyeOffIcon.style.display = showPassword ? "block" : "none";
        });

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          setError(null);
          setLoading(true);

          setTimeout(function () {
            const normalized = emailInput.value.toLowerCase().trim();
            const redirect = normalized.includes("member")
              ? "member.html"
              : "home.html";
            window.location.href = redirect;
          }, 300);
        });
      })();
    </script>
  </body>
</html>
