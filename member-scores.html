<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rise Stronger — Scores</title>

    <style>
      :root {
        --rssc-color-bg-canvas: #f7f7f5;
        --rssc-color-text-primary: #171717;
        --rssc-color-text-secondary: #4b4a45;
        --rssc-color-text-tertiary: #8c8a80;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        font-family: "General Sans", Inter, system-ui, sans-serif;
        font-size: 14px;
        line-height: 20px;
        color: var(--rssc-color-text-primary);
        background: var(--rssc-color-bg-canvas);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      img,
      svg {
        display: block;
        max-width: 100%;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      p,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        margin: 0;
      }

      /* ─── Shell ──────────────────────────────────────────────────────── */
      .rssc-m-root {
        min-height: 100dvh;
        background: #ededE8;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .rssc-m-shell {
        position: relative;
        width: 100%;
        max-width: 430px;
        min-height: 100dvh;
        background: #fafaf8;
        display: flex;
        flex-direction: column;
      }

      @media (min-width: 500px) {
        .rssc-m-shell {
          min-height: calc(100dvh - 0px);
          box-shadow:
            0 0 0 1px rgba(0, 0, 0, 0.06),
            0 8px 40px rgba(0, 0, 0, 0.1);
        }
      }

      .rssc-m-topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        height: 52px;
        background: #fafaf8;
        border-bottom: 1px solid #eaeaE5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        flex-shrink: 0;
      }

      .rssc-m-wordmark {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        font-weight: 700;
        color: #171717;
        letter-spacing: -0.015em;
      }

      .rssc-m-wordmark-icon {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: #eef2ff;
        color: #3347e6;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .rssc-m-topbar-avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: #3d5afe;
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        flex-shrink: 0;
      }

      .rssc-m-content {
        flex: 1;
        overflow-y: auto;
        padding: 20px 16px 84px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .rssc-m-bottomnav {
        position: sticky;
        bottom: 0;
        z-index: 20;
        height: 64px;
        background: #fafaf8;
        border-top: 1px solid #eaeaE5;
        display: flex;
        align-items: stretch;
        flex-shrink: 0;
      }

      .rssc-m-nav-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        text-decoration: none;
        color: #a8a59e;
        border: none;
        background: none;
        cursor: pointer;
        transition: color 0.12s;
        -webkit-tap-highlight-color: transparent;
      }

      .rssc-m-nav-item--active {
        color: #3d5afe;
      }

      .rssc-m-nav-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .rssc-m-section-title {
        font-size: 11px;
        font-weight: 700;
        color: #a8a59e;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 10px;
      }

      .rssc-m-card {
        background: #fff;
        border: 1px solid #eaeaE5;
        border-radius: 14px;
        padding: 16px;
      }

      /* ─── WOD badges (reused in score part labels) ───────────────────── */
      .rssc-m-wod-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        border-radius: 6px;
        background: #eef2ff;
        color: #3d5afe;
        font-size: 10px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .rssc-m-wod-badge--b {
        background: #f0fdf4;
        color: #16a34a;
      }

      /* ─── Score log form ─────────────────────────────────────────────── */
      .rssc-m-score-part {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }

      .rssc-m-score-part + .rssc-m-score-part {
        padding-top: 16px;
        border-top: 1px solid #f0f0eb;
      }

      .rssc-m-score-part-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 700;
        color: #6b6963;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .rssc-m-score-movement {
        font-size: 15px;
        font-weight: 700;
        color: #171717;
      }

      .rssc-m-score-input-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .rssc-m-score-input {
        width: 80px;
        height: 52px;
        border: 1.5px solid #d9d9d4;
        border-radius: 10px;
        padding: 0 12px;
        font-size: 22px;
        font-weight: 700;
        color: #171717;
        background: #fff;
        outline: none;
        transition: border-color 0.12s;
        -webkit-appearance: none;
        -moz-appearance: textfield;
        text-align: center;
      }

      .rssc-m-score-input::-webkit-outer-spin-button,
      .rssc-m-score-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .rssc-m-score-input:focus {
        border-color: #3d5afe;
        box-shadow: 0 0 0 3px rgba(61, 90, 254, 0.1);
      }

      .rssc-m-score-input--wide {
        width: 110px;
      }

      .rssc-m-score-input-unit {
        font-size: 14px;
        color: #8c8a80;
        font-weight: 500;
      }

      .rssc-m-time-inputs {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .rssc-m-time-sep {
        font-size: 24px;
        font-weight: 700;
        color: #c4c2ba;
        line-height: 1;
        margin: 0 2px;
      }

      .rssc-m-pr-hint {
        font-size: 12px;
        color: #8c8a80;
      }

      .rssc-m-pr-hint--new {
        color: #d97706;
        font-weight: 600;
      }

      .rssc-m-save-btn {
        width: 100%;
        height: 46px;
        border-radius: 10px;
        border: none;
        background: #3d5afe;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 4px;
        transition:
          background 0.12s,
          opacity 0.12s;
        -webkit-tap-highlight-color: transparent;
      }

      .rssc-m-save-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      /* ─── Score saved state ──────────────────────────────────────────── */
      .rssc-m-score-saved {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 20px 0 8px;
        text-align: center;
      }

      .rssc-m-score-saved-icon {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #f0fdf4;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #16a34a;
      }

      .rssc-m-score-saved-title {
        font-size: 15px;
        font-weight: 700;
        color: #171717;
      }

      .rssc-m-score-saved-sub {
        font-size: 13px;
        color: #6b6963;
      }

      .rssc-m-pr-banner {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #fffbeb;
        border: 1px solid #fde68a;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 600;
        color: #92400e;
      }

      /* ─── PR list ────────────────────────────────────────────────────── */
      .rssc-m-pr-list {
        display: flex;
        flex-direction: column;
      }

      .rssc-m-pr-row {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        gap: 12px;
        border-bottom: 1px solid #f5f5f3;
      }

      .rssc-m-pr-row:last-child {
        border-bottom: none;
      }

      .rssc-m-pr-row--new {
        background: #fffbeb;
        border-radius: 10px;
        border-bottom: none;
        margin-bottom: 4px;
      }

      .rssc-m-pr-movement {
        flex: 1;
        font-size: 14px;
        font-weight: 500;
        color: #171717;
      }

      .rssc-m-pr-value {
        font-size: 14px;
        font-weight: 700;
        color: #171717;
        min-width: 60px;
        text-align: right;
      }

      .rssc-m-pr-value--new {
        color: #d97706;
      }

      .rssc-m-pr-date {
        font-size: 12px;
        color: #a8a59e;
        min-width: 44px;
        text-align: right;
      }
    </style>
  </head>

    <script>
      (function () {
        const SVG_NS = "http://www.w3.org/2000/svg";

        function createStore(initialState) {
          let state = structuredClone(initialState);
          const listeners = new Set();
          return {
            get: () => state,
            set(updater) {
              state =
                typeof updater === "function"
                  ? updater(state)
                  : { ...state, ...updater };
              listeners.forEach((fn) => fn(state));
            },
            subscribe(fn) {
              listeners.add(fn);
              return () => listeners.delete(fn);
            },
          };
        }

        // ─── Seed data (from pages/member/data.ts + admin/programming/data.ts) ──
        const TODAY_SHORT = "Apr 9";

        // Today's workout (2026-04-09): Deadlift + For time 21-15-9
        const WORKOUT = {
          partA: {
            movementId: "m-004",
            movementName: "Deadlift",
          },
          partB: "For time:\n21-15-9\nThrusters (43/30 kg)\nBurpees",
        };

        const PERSONAL_RECORDS = [
          { movementId: "m-001", movementName: "Back Squat",   valueKg: 52.5, display: "52.5 kg", dateDisplay: "Feb 18" },
          { movementId: "m-004", movementName: "Deadlift",     valueKg: 67.5, display: "67.5 kg", dateDisplay: "Mar 12" },
          { movementId: "m-006", movementName: "Bench Press",  valueKg: 35,   display: "35 kg",   dateDisplay: "Mar 3"  },
          { movementId: "m-007", movementName: "Strict Press", valueKg: 27.5, display: "27.5 kg", dateDisplay: "Feb 25" },
          { movementId: "m-009", movementName: "Power Clean",  valueKg: 42.5, display: "42.5 kg", dateDisplay: "Mar 19" },
        ];

        const DEADLIFT_PR = PERSONAL_RECORDS.find(
          (p) => p.movementId === "m-004",
        );

        // ─── Store ───────────────────────────────────────────────────────
        const store = createStore({
          weightKg: "",
          timeMins: "",
          timeSecs: "",
          saved: false,
          newPR: false,
          prs: PERSONAL_RECORDS,
        });

        // ─── Derived state ───────────────────────────────────────────────
        function isPRWeight(weightKg) {
          const n = parseFloat(weightKg) || 0;
          return n > DEADLIFT_PR.valueKg;
        }

        function canSave(s) {
          return (
            s.weightKg !== "" || s.timeMins !== "" || s.timeSecs !== ""
          );
        }

        // ─── Actions ─────────────────────────────────────────────────────
        function setWeight(v) {
          store.set({ weightKg: v });
        }
        function setTimeMins(v) {
          store.set({ timeMins: v });
        }
        function setTimeSecs(v) {
          store.set({ timeSecs: v });
        }

        function handleSave() {
          const s = store.get();
          if (!canSave(s)) return;

          const pr = isPRWeight(s.weightKg);
          const weightNum = parseFloat(s.weightKg) || 0;

          store.set((prev) => ({
            ...prev,
            saved: true,
            newPR: pr,
            prs: pr
              ? prev.prs.map((p) =>
                  p.movementId === "m-004"
                    ? {
                        ...p,
                        valueKg: weightNum,
                        display: weightNum + " kg",
                        dateDisplay: TODAY_SHORT,
                      }
                    : p,
                )
              : prev.prs,
          }));
        }

        function handleLogAnother() {
          store.set({
            weightKg: "",
            timeMins: "",
            timeSecs: "",
            saved: false,
          });
        }

        // ─── DOM helpers ─────────────────────────────────────────────────
        function el(tag, attrs, children) {
          const node = document.createElement(tag);
          if (attrs) {
            for (const k in attrs) {
              if (k === "className") node.className = attrs[k];
              else if (k === "textContent") node.textContent = attrs[k];
              else if (k === "style") {
                for (const sk in attrs[k]) node.style[sk] = attrs[k][sk];
              } else if (attrs[k] != null) node.setAttribute(k, attrs[k]);
            }
          }
          if (children) for (const c of children) if (c) node.appendChild(c);
          return node;
        }

        function svg(attrs, children) {
          const node = document.createElementNS(SVG_NS, "svg");
          node.setAttribute("xmlns", SVG_NS);
          for (const k in attrs) node.setAttribute(k, attrs[k]);
          if (children) for (const c of children) node.appendChild(c);
          return node;
        }

        function svgPath(d) {
          const p = document.createElementNS(SVG_NS, "path");
          p.setAttribute("d", d);
          return p;
        }

        function makeCheckIcon() {
          return svg(
            {
              width: "22",
              height: "22",
              viewBox: "0 0 24 24",
              fill: "none",
              stroke: "currentColor",
              "stroke-width": "2.5",
              "stroke-linecap": "round",
              "stroke-linejoin": "round",
              "aria-hidden": "true",
            },
            [svgPath("M20 6 9 17l-5-5")],
          );
        }

        function makeTrophyIcon() {
          return svg(
            {
              width: "16",
              height: "16",
              viewBox: "0 0 24 24",
              fill: "none",
              stroke: "currentColor",
              "stroke-width": "2",
              "stroke-linecap": "round",
              "stroke-linejoin": "round",
              "aria-hidden": "true",
            },
            [
              svgPath("M6 9H4.5a2.5 2.5 0 0 1 0-5H6"),
              svgPath("M18 9h1.5a2.5 2.5 0 0 0 0-5H18"),
              svgPath("M4 22h16"),
              svgPath(
                "M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22",
              ),
              svgPath(
                "M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22",
              ),
              svgPath("M18 2H6v7a6 6 0 0 0 12 0V2Z"),
            ],
          );
        }

        // ─── Render: score form ──────────────────────────────────────────
        function renderScoreForm() {
          const s = store.get();
          const children = [];

          if (WORKOUT.partA) {
            const badge = el("span", {
              className: "rssc-m-wod-badge",
              "data-comment": "scores-part-a-badge",
              textContent: "A",
            });
            const label = el(
              "div",
              {
                className: "rssc-m-score-part-label",
                "data-comment": "scores-part-a-label",
              },
              [badge, document.createTextNode("Part A")],
            );
            const movement = el("div", {
              className: "rssc-m-score-movement",
              "data-comment": "scores-part-a-movement",
              textContent: WORKOUT.partA.movementName,
            });
            const weightInput = el("input", {
              className: "rssc-m-score-input rssc-m-score-input--wide",
              type: "text",
              inputmode: "decimal",
              placeholder: "0",
              value: s.weightKg,
              "aria-label": "Weight in kg",
              id: "scores-weight-input",
              "data-comment": "scores-weight-input",
            });
            weightInput.addEventListener("input", function () {
              setWeight(weightInput.value);
            });
            const unit = el("span", {
              className: "rssc-m-score-input-unit",
              "data-comment": "scores-weight-unit",
              textContent: "kg",
            });
            const inputRow = el(
              "div",
              {
                className: "rssc-m-score-input-row",
                "data-comment": "scores-weight-row",
              },
              [weightInput, unit],
            );
            const pr = isPRWeight(s.weightKg);
            const hint = el("div", {
              className:
                "rssc-m-pr-hint" + (pr ? " rssc-m-pr-hint--new" : ""),
              "data-comment": "scores-pr-hint",
              textContent: pr
                ? "New PR! Current: " + DEADLIFT_PR.display
                : "Current PR: " +
                  DEADLIFT_PR.display +
                  " · " +
                  DEADLIFT_PR.dateDisplay,
            });
            children.push(
              el(
                "div",
                {
                  className: "rssc-m-score-part",
                  "data-comment": "scores-part-a",
                },
                [label, movement, inputRow, hint],
              ),
            );
          }

          if (WORKOUT.partB) {
            const badge = el("span", {
              className: "rssc-m-wod-badge rssc-m-wod-badge--b",
              "data-comment": "scores-part-b-badge",
              textContent: "B",
            });
            const label = el(
              "div",
              {
                className: "rssc-m-score-part-label",
                "data-comment": "scores-part-b-label",
              },
              [badge, document.createTextNode("For time")],
            );
            const minsInput = el("input", {
              className: "rssc-m-score-input",
              type: "text",
              inputmode: "numeric",
              placeholder: "0",
              value: s.timeMins,
              "aria-label": "Minutes",
              id: "scores-time-mins",
              "data-comment": "scores-time-mins",
            });
            minsInput.addEventListener("input", function () {
              setTimeMins(minsInput.value);
            });
            const sep = el("span", {
              className: "rssc-m-time-sep",
              "data-comment": "scores-time-sep",
              textContent: ":",
            });
            const secsInput = el("input", {
              className: "rssc-m-score-input",
              type: "text",
              inputmode: "numeric",
              placeholder: "00",
              value: s.timeSecs,
              "aria-label": "Seconds",
              id: "scores-time-secs",
              "data-comment": "scores-time-secs",
            });
            secsInput.addEventListener("input", function () {
              setTimeSecs(secsInput.value);
            });
            const unit = el("span", {
              className: "rssc-m-score-input-unit",
              "data-comment": "scores-time-unit",
              textContent: "min : sec",
            });
            const timeRow = el(
              "div",
              {
                className: "rssc-m-time-inputs",
                "data-comment": "scores-time-row",
              },
              [minsInput, sep, secsInput, unit],
            );
            children.push(
              el(
                "div",
                {
                  className: "rssc-m-score-part",
                  "data-comment": "scores-part-b",
                },
                [label, timeRow],
              ),
            );
          }

          const saveBtn = el("button", {
            className: "rssc-m-save-btn",
            "data-comment": "scores-save-btn",
            textContent: "Save score",
          });
          if (!canSave(s)) saveBtn.disabled = true;
          saveBtn.addEventListener("click", handleSave);
          children.push(saveBtn);

          return children;
        }

        // ─── Render: score saved state ───────────────────────────────────
        function renderScoreSaved() {
          const s = store.get();
          const children = [];

          const iconWrap = el(
            "div",
            {
              className: "rssc-m-score-saved-icon",
              "data-comment": "scores-saved-icon",
            },
            [makeCheckIcon()],
          );
          children.push(iconWrap);

          children.push(
            el("div", {
              className: "rssc-m-score-saved-title",
              "data-comment": "scores-saved-title",
              textContent: "Score logged",
            }),
          );

          const subParts = [];
          if (s.weightKg) subParts.push(s.weightKg + " kg");
          if (s.timeMins || s.timeSecs) {
            const mins = s.timeMins || "0";
            const secs = (s.timeSecs || "0").padStart(2, "0");
            subParts.push(mins + ":" + secs);
          }
          children.push(
            el("div", {
              className: "rssc-m-score-saved-sub",
              "data-comment": "scores-saved-sub",
              textContent: subParts.join(" · "),
            }),
          );

          if (s.newPR) {
            const banner = el(
              "div",
              {
                className: "rssc-m-pr-banner",
                "data-comment": "scores-pr-banner",
              },
              [
                makeTrophyIcon(),
                document.createTextNode(
                  "New personal record on Deadlift!",
                ),
              ],
            );
            children.push(banner);
          }

          const logAnotherBtn = el("button", {
            className: "rssc-m-save-btn",
            style: { marginTop: "8px", background: "#F5F5F3", color: "#6B6963" },
            "data-comment": "scores-log-another-btn",
            textContent: "Log another",
          });
          logAnotherBtn.addEventListener("click", handleLogAnother);
          children.push(logAnotherBtn);

          return [
            el(
              "div",
              {
                className: "rssc-m-score-saved",
                "data-comment": "scores-saved",
              },
              children,
            ),
          ];
        }

        function renderScoreSection() {
          const card = document.getElementById("scores-card");
          const s = store.get();
          card.replaceChildren(
            ...(s.saved ? renderScoreSaved() : renderScoreForm()),
          );
        }

        // ─── Render: PR list ─────────────────────────────────────────────
        function renderPRList() {
          const { prs, newPR } = store.get();
          const container = document.getElementById("pr-list");
          const rows = prs.map(function (pr) {
            const isNew = newPR && pr.movementId === "m-004";
            const dc = "pr-row-" + pr.movementId;
            const movement = el("span", {
              className: "rssc-m-pr-movement",
              "data-comment": dc + "-movement",
              textContent: pr.movementName,
            });
            const value = el("span", {
              className:
                "rssc-m-pr-value" + (isNew ? " rssc-m-pr-value--new" : ""),
              "data-comment": dc + "-value",
              textContent: isNew ? pr.display + " 🏆" : pr.display,
            });
            const date = el("span", {
              className: "rssc-m-pr-date",
              "data-comment": dc + "-date",
              textContent: pr.dateDisplay,
            });
            return el(
              "div",
              {
                className:
                  "rssc-m-pr-row" + (isNew ? " rssc-m-pr-row--new" : ""),
                "data-comment": dc,
              },
              [movement, value, date],
            );
          });
          container.replaceChildren(...rows);
        }

        // ─── Preserve input focus across re-renders ──────────────────────
        // Without this, typing weight loses focus each keystroke.
        // Track which input is focused + caret before swap, restore after.
        let focusSnapshot = null;

        function snapshotFocus() {
          const a = document.activeElement;
          if (
            a &&
            (a.id === "scores-weight-input" ||
              a.id === "scores-time-mins" ||
              a.id === "scores-time-secs")
          ) {
            focusSnapshot = {
              id: a.id,
              selStart: a.selectionStart,
              selEnd: a.selectionEnd,
            };
          } else {
            focusSnapshot = null;
          }
        }

        function restoreFocus() {
          if (!focusSnapshot) return;
          const node = document.getElementById(focusSnapshot.id);
          if (!node) return;
          node.focus();
          try {
            node.setSelectionRange(
              focusSnapshot.selStart,
              focusSnapshot.selEnd,
            );
          } catch (_) {}
        }

        store.subscribe(function () {
          snapshotFocus();
          renderScoreSection();
          restoreFocus();
          renderPRList();
        });

        renderScoreSection();
        renderPRList();
      })();
    </script>
  </body>
</html>
